type: function
function:
  name: get_similar_movies
  description: >
    Obtiene películas similares basándose estrictamente en géneros y keywords compartidos
    (content-based filtering). Úsala cuando el usuario quiera películas del mismo género o
    temática que una dada, por ejemplo: "más películas de ciencia ficción como X" o
    "algo con la misma temática que X". Los resultados se mantienen dentro de los mismos
    géneros que la película de referencia.
    Primero usa search_movie_by_title para obtener el movie_id.
  parameters:
    type: object
    properties:
      movie_id:
        type: integer
        description: >
          ID numérico de la película de referencia en TMDB.
          Obtenible con search_movie_by_title.
    required:
      - movie_id
