type: function
function:
  name: get_movie_recommendations
  description: >
    Obtiene recomendaciones personalizadas para una película usando el algoritmo curado de TMDB
    (collaborative filtering). Úsala como primera opción cuando el usuario diga "algo parecido a X",
    "películas como X", o "recomiéndame algo como X". Los resultados pueden incluir películas de
    géneros distintos si encajan temáticamente.
    Primero usa search_movie_by_title para obtener el movie_id, luego llama a esta tool.
  parameters:
    type: object
    properties:
      movie_id:
        type: integer
        description: >
          ID numérico de la película de referencia en TMDB.
          Obtenible con search_movie_by_title.
    required:
      - movie_id
